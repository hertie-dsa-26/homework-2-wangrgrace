{% extends 'layout.html' %}
{% block content %}
	<h1>Circle Calculator</h1>
    <form method="POST">
    <label for="radius">Radius:</label>
    <input type="number" id="radius" name="radius" placeholder="Enter radius" required min="0" step="any">
    <button type="submit">Calculate</button>
</form>

   <br>

    {% if printed_result %}
    <p>Perimeter: {{ printed_result }}</p>
{% endif %}

{% endblock %}
